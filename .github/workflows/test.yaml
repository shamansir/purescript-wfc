name: Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This project's toolchain (purs-unstable/spago-unstable, pinned in
      # flake.nix) only exists inside the Nix dev shell — no bare purs/spago
      # calls, see CLAUDE.md.
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build
        run: nix develop --command bash -c "spago build --json-errors"

      - name: Test
        run: nix develop --command bash -c "spago test"
