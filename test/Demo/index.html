<!DOCTYPE html>
<!-- Build: spago bundle --package demo --module Demo.Main --outfile index.js --platform browser -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WFC Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 13px;
      display: flex;
      align-items: stretch;
      min-height: 100vh;
    }

    .demo {
      display: flex;
      flex-direction: row;
      width: 100%;
      gap: 16px;
      padding: 16px;
    }

    /* ---- Sidebar ---- */
    /* `.sidebar-top` (selector/config/preview/Extract) and `.sidebar-bottom`
       (patterns/rules) are two separately-orderable pieces so portrait can
       interleave `.main-view`/`.run-panel` between them — see the
       `@media (orientation: portrait)` block below, and Demo.App's
       `render`/`renderSidebar` doc comment. Each gets the same
       flex-column/gap `.sidebar` used to have on its direct children, so
       desktop (where `.sidebar` stays a normal box) looks unchanged. */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-top,
    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar select {
      width: 100%;
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 13px;
    }

    /* ---- Upload ---- */
    .upload {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: #8b949e;
    }

    .upload input[type="file"] {
      color: #c9d1d9;
      font-size: 11px;
      max-width: 100%;
    }

    .upload-status {
      color: #7ee787;
    }

    .upload-error {
      color: #ff7b72;
    }

    /* ---- Pattern/result size controls ---- */
    .size-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 11px;
      color: #8b949e;
    }

    .size-label {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .size-label select,
    .size-label input {
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 5px;
      font-family: inherit;
      font-size: 11px;
      width: 52px;
    }

    .size-radio {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      margin-right: 8px;
      cursor: pointer;
    }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .controls button {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .controls button:hover:not(:disabled) { background: #30363d; }
    .controls button:disabled { opacity: 0.4; cursor: default; }

    /* Highlights Extract while patterns haven't been (re-)extracted yet
       for the current sample/settings; cleared once st.catalog is Just. */
    .controls button.needs-extract {
      border-color: #58a6ff;
      box-shadow: 0 0 0 1px #58a6ff;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #8b949e;
      width: 100%;
      cursor: pointer;
    }

    .toggle-row:has(input:disabled) { opacity: 0.4; cursor: default; }

    /* ---- Stats ---- */
    .stats {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      line-height: 1.6;
      font-size: 11px;
      color: #8b949e;
    }

    /* ---- Step history: one row per cycle (restart or backtrack) ---- */
    .history-canvas {
      width: 256px;
      height: 256px;
      cursor: pointer;
    }

    .history-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 240px;
      padding: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      max-width: 100%;
    }

    .history-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 1px;
    }

    .progress-spacer {
      flex: 0 0 auto;
      width: 26px;
      height: 30px;
    }

    .progress-cell {
      flex: 0 0 auto;
      width: 26px;
      height: 30px;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 8px;
      line-height: 1.3;
      color: #0d1117;
    }

    .progress-cell-percent {
      opacity: 0.75;
    }

    .progress-cell:hover {
      transform: scaleY(1.1);
    }

    .progress-cell.restarted {
      box-shadow: inset 2px 0 0 0 #f4d03f;
    }

    .progress-cell.contradiction {
      color: #ffffff;
      box-shadow: inset 0 0 0 1px #ffffff;
    }

    .progress-cell.viewed {
      box-shadow: 0 0 0 2px #58a6ff;
    }

    /* ---- Pattern section ---- */
    .pattern-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toggle-btn {
      background: #161b22;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
    }

    .toggle-btn:hover { background: #21262d; }

    .pattern-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
    }

    .pattern-thumb {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .pattern-grid {
      display: grid;
      width: 40px;
      height: 40px;
    }

    .mini-cell {
      width: 100%;
      height: 100%;
    }

    .pat-label {
      font-size: 9px;
      color: #8b949e;
    }

    /* ---- Symmetry badges: top-right of each pattern thumbnail ---- */
    .symmetry-badges {
      position: absolute;
      top: -2px;
      right: -2px;
      display: flex;
      gap: 1px;
    }

    .symmetry-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #21262d;
      border: 1px solid #30363d;
      font-size: 8px;
      line-height: 1;
      color: #c9d1d9;
    }

    .symmetry-badge.rotate {
      color: #58a6ff;
    }

    .symmetry-badge.mirror {
      color: #f0c000;
    }

    /* ---- Main view ---- */
    /* No `flex: 1` here on purpose: growing to fill the row would push
       `.run-panel` all the way to the far edge of a wide viewport instead
       of sitting right after the canvas/grid. */
    .main-view {
      flex: 0 1 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }

    /* ---- Run panel (desktop: right of canvas; mobile: stacked below) ---- */
    .run-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* `.demo` defaults to a row (sidebar / canvas+table / run-panel) for
       desktop widths; below the breakpoint, stack everything in one column
       in DOM order instead. */
    @media (max-width: 860px) {
      .demo {
        flex-direction: column;
      }

      .sidebar, .run-panel {
        width: 100%;
      }
    }

    /* ---- Portrait-only reorder: selector+config, source preview, Extract,
       then run controls, then the main canvas+grid, and only then
       patterns/rules. `.sidebar` switches to `display: contents` here,
       which removes *it* from layout while promoting its two children
       (`.sidebar-top`, `.sidebar-bottom`) to direct flex items of `.demo`
       — the only way to get `.main-view`/`.run-panel` to land *between*
       them without duplicating any markup (see Demo.App's `render` doc
       comment). Landscape/desktop are untouched — `.sidebar` stays a
       normal box there, so `.sidebar-top`/`.sidebar-bottom` just stack
       inside it as before. */
    @media (orientation: portrait) {
      .demo {
        flex-direction: column;
      }

      .sidebar {
        display: contents;
      }

      .sidebar-top,
      .sidebar-bottom,
      .run-panel {
        width: 100%;
      }

      .sidebar-top {
        order: 1;
      }

      .run-panel {
        order: 2;
      }

      .main-view {
        order: 3;
      }

      .sidebar-bottom {
        order: 4;
      }
    }

    canvas {
      border: 1px solid #30363d;
      border-radius: 4px;
      display: block;
      image-rendering: pixelated;
    }

    /* Eases the canvas to its new aspect-fit size (set inline via JS,
       see Demo.App's renderMain) whenever the selected example or Result
       W/H changes, instead of snapping to it instantly. */
    #wfc-canvas {
      transition: width 0.3s ease, height 0.3s ease;
    }

    /* ---- Matrix ---- */
    .matrix {
      border-collapse: collapse;
      font-size: 8px;
    }

    .matrix td {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      vertical-align: middle;
      overflow: hidden;
      padding: 0;
    }

    .uncollapsed {
      background: #1e2530;
    }

    /* ---- Source preview: the raw grid/tiles patterns get extracted from ---- */
    .source-preview {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .source-label {
      font-size: 11px;
      color: #8b949e;
    }

    .source-grid {
      border-collapse: collapse;
      table-layout: fixed;
      /* `.source-preview`'s `flex-direction:column` defaults to
         `align-items:stretch` on the cross axis (width) — without this,
         the table stretches to the full sidebar width regardless of its
         own content size, and `table-layout:fixed` then spreads that
         extra width evenly across every column, turning each cell into a
         wide rectangle instead of the intended square. */
      align-self: flex-start;
    }

    .source-grid td {
      padding: 0;
    }

    /* Shown instead of `.source-grid` while a `SrcImage` sample's pixels
       are still being fetched/decoded — same neutral shade as the main
       canvas's own pre-Extract placeholder, sized (via inline style) to
       the last successfully-loaded image so nothing jumps around once the
       real preview replaces it. */
    .source-grid-placeholder {
      background: #232a38;
      border-radius: 2px;
      align-self: flex-start;
    }

    .tile-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tile-swatch {
      width: 32px;
      height: 32px;
      border-radius: 2px;
      border: 1px solid #30363d;
      overflow: hidden;
    }

    /* ---- Rules panel: one row per declared <neighbor> rule, shown as its
       two actual tiles either side of an arrow ---- */
    .rules-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rule-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 320px;
      overflow-y: auto;
    }

    .rule-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rule-arrow {
      color: #8b949e;
      font-size: 12px;
    }

    .sudoku {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      height: 100%;
    }

    .sudoku span {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="index.js" type="module"></script>
</body>
</html>
