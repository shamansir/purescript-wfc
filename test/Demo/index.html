<!DOCTYPE html>
<!-- Build: spago bundle --package demo --module Demo.Main --outfile index.js --platform browser -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WFC Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 13px;
      display: flex;
      align-items: stretch;
      min-height: 100vh;
    }

    .demo {
      display: flex;
      flex-direction: row;
      width: 100%;
      gap: 16px;
      padding: 16px;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar select {
      width: 100%;
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 13px;
    }

    /* ---- Upload ---- */
    .upload {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: #8b949e;
    }

    .upload input[type="file"] {
      color: #c9d1d9;
      font-size: 11px;
      max-width: 100%;
    }

    .upload-status {
      color: #7ee787;
    }

    .upload-error {
      color: #ff7b72;
    }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .controls button {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .controls button:hover:not(:disabled) { background: #30363d; }
    .controls button:disabled { opacity: 0.4; cursor: default; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #8b949e;
      width: 100%;
      cursor: pointer;
    }

    .toggle-row:has(input:disabled) { opacity: 0.4; cursor: default; }

    /* ---- Stats ---- */
    .stats {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      line-height: 1.6;
      font-size: 11px;
      color: #8b949e;
    }

    /* ---- Step history: one row per cycle (restart or backtrack) ---- */
    .history-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 240px;
      padding: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      max-width: 100%;
    }

    .history-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 1px;
    }

    .progress-spacer {
      flex: 0 0 auto;
      width: 8px;
      height: 20px;
    }

    .progress-cell {
      flex: 0 0 auto;
      width: 8px;
      height: 20px;
      border-radius: 1px;
      cursor: pointer;
    }

    .progress-cell:hover {
      transform: scaleY(1.15);
    }

    .progress-cell.restarted {
      box-shadow: inset 2px 0 0 0 #f4d03f;
    }

    .progress-cell.contradiction {
      box-shadow: inset 0 0 0 1px #ffffff;
    }

    .progress-cell.viewed {
      box-shadow: 0 0 0 2px #58a6ff;
    }

    /* ---- Pattern section ---- */
    .pattern-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toggle-btn {
      background: #161b22;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
    }

    .toggle-btn:hover { background: #21262d; }

    .pattern-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
    }

    .pattern-thumb {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .pattern-grid {
      display: grid;
      width: 40px;
      height: 40px;
    }

    .mini-cell {
      width: 100%;
      height: 100%;
    }

    .pat-label {
      font-size: 9px;
      color: #8b949e;
    }

    /* ---- Main view ---- */
    /* No `flex: 1` here on purpose: growing to fill the row would push
       `.run-panel` all the way to the far edge of a wide viewport instead
       of sitting right after the canvas/grid. */
    .main-view {
      flex: 0 1 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }

    /* ---- Run panel (desktop: right of canvas; mobile: stacked below) ---- */
    .run-panel {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* `.demo` defaults to a row (sidebar / canvas+table / run-panel) for
       desktop widths; below the breakpoint, stack everything in one column
       in DOM order instead. */
    @media (max-width: 860px) {
      .demo {
        flex-direction: column;
      }

      .sidebar, .run-panel {
        width: 100%;
      }
    }

    canvas {
      border: 1px solid #30363d;
      border-radius: 4px;
      display: block;
      image-rendering: pixelated;
    }

    /* ---- Matrix ---- */
    .matrix {
      border-collapse: collapse;
      font-size: 8px;
    }

    .matrix td {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      vertical-align: middle;
      overflow: hidden;
      padding: 0;
    }

    .uncollapsed {
      background: #1e2530;
    }

    /* ---- Source preview: the raw grid/tiles patterns get extracted from ---- */
    .source-preview {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .source-label {
      font-size: 11px;
      color: #8b949e;
    }

    .source-grid {
      border-collapse: collapse;
    }

    .source-grid td {
      width: 10px;
      height: 10px;
      padding: 0;
    }

    .tile-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tile-swatch {
      width: 20px;
      height: 20px;
      border-radius: 2px;
      border: 1px solid #30363d;
    }

    .sudoku {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      height: 100%;
    }

    .sudoku span {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="index.js" type="module"></script>
</body>
</html>
